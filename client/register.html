<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartBudget – Register</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Premium Styles -->
    <link rel="stylesheet" href="css/premium.css">
    <link rel="stylesheet" href="css/register.css">
</head>
<body>

    <!-- ================= REGISTER PAGE ================= -->
    <div class="auth-page">
        
        <!-- Background Effects -->
        <div class="auth-bg">
            <div class="bg-orb bg-orb-1"></div>
            <div class="bg-orb bg-orb-2"></div>
            <div class="bg-orb bg-orb-3"></div>
        </div>

        <div class="auth-container animate-fade-in-up">
            
            <!-- Logo Section -->
            <div class="auth-header">
                <h1 class="logo text-gradient">SmartBudget</h1>
                <p class="tagline">Personal Finance Intelligence</p>
            </div>

            <!-- Register Card -->
            <div class="premium-card glass-card-hover auth-card">
                
                <h2>Create Account</h2>
                <p class="auth-subtitle">Start managing your finances smarter</p>

                <form id="registerForm">
                    
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="name" class="input-premium" placeholder="Enter your full name" required>
                    </div>

                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="email" class="input-premium" placeholder="Enter your email" required>
                    </div>

                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="password" class="input-premium" placeholder="Create password" required>
                    </div>

                    <div class="form-group">
                        <label>Confirm Password</label>
                        <input type="password" id="confirmPassword" class="input-premium" placeholder="Confirm password" required>
                    </div>

                    <button type="submit" class="btn-premium btn-primary auth-btn">
                        Create Account
                    </button>

                </form>

                <p class="login-link">
                    Already have an account? <a href="login.html" class="text-gradient">Sign In</a>
                </p>

            </div>

            <!-- Footer -->
            <p class="auth-footer">
                © 2026 SmartBudget | Built with ❤️ for Financial Intelligence
            </p>

        </div>

    </div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
