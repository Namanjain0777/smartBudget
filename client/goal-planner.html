<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartBudget – Wealth Planner</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Styles -->
    <link rel="stylesheet" href="css/premium.css">
    <link rel="stylesheet" href="css/goal_palnner.css">
    <style>
        /* NAVBAR */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(10, 14, 23, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* CONTAINER */
        .nav-container {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            height: 70px;
        }

        /* LEFT */
        .nav-left {
            display: flex;
            flex-direction: column;
        }

        .logo {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            font-size: 11px;
            color: #6b7280;
        }

        /* CENTER MENU */
        .nav-center {
            display: flex;
            gap: 32px;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .nav-link {
            text-decoration: none;
            color: #9ca3af;
            font-size: 14px;
            font-weight: 500;
            position: relative;
            padding: 8px 0;
            transition: .3s;
        }

        .nav-link:hover,
        .nav-link.active {
            color: white;
        }

        .nav-link::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            transition: .3s;
        }

        .nav-link:hover::after,
        .nav-link.active::after {
            width: 100%;
        }

        /* RIGHT */
        .nav-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        #userNameNav {
            font-weight: 600;
            color: #8b5cf6;
        }

        /* LOGOUT BUTTON */
        .logout-btn {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            transition: .3s;
        }

        .logout-btn:hover {
            background: #ef4444;
            color: white;
        }

        /* RESPONSIVE */
        @media(max-width:768px) {

            .nav-center {
                display: none;
            }

            .nav-container {
                padding: 0 20px;
            }

        }
    </style>
</head>

<body>

    <!-- Identical Premium Navbar for all pages -->
    <header class="navbar premium-navbar">
        <div class="nav-container">
            <div class="nav-left">
                <h2 class="logo text-gradient">SmartBudget</h2>
                <span class="tagline">Personal Finance Intelligence</span>
            </div>

            <nav class="nav-center">
                <a href="dashboard.html" class="nav-link" data-page="dashboard">Dashboard</a>
                <a href="goal-planner.html" class="nav-link active" data-page="goal-planner">Wealth Planner</a>
                <a href="ai-advisor.html" class="nav-link" data-page="ai-advisor">AI Advisor</a>
                <a href="stock-predictor.html" class="nav-link" data-page="stock-predictor">Stock Predictor</a>
                <a href="credit-card-advisor.html" class="nav-link" data-page="credit-card">Credit Cards</a>
                <a href="contact.html" class="nav-link" data-page="contact">Contact</a>
            </nav>

            <div class="nav-right">
                <strong id="userNameNav" class="text-gradient">User</strong>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </div>
    </header>

    <!-- ================= MAIN CONTENT ================= -->
    <main class="dashboard-container">

        <h1 class="page-title animate-fade-in-up">💰 Wealth Planner</h1>

        <!-- Quick Stats -->
        <div class="quick-stats">
            <div class="stat-card">
                <span class="stat-label">Total Projected Wealth</span>
                <span class="stat-value" id="totalProjected">₹0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Active Goals</span>
                <span class="stat-value" id="activeGoals">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Monthly Investment</span>
                <span class="stat-value" id="monthlyInvest">₹0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Net Worth</span>
                <span class="stat-value" id="netWorthDisplay">₹0</span>
            </div>
        </div>

        <!-- calculators and all other content unchanged... -->
        <!-- [Rest of the original goal-planner.html content remains the same] -->

    </main>

    <!-- Floating Quick Actions -->
    <div class="floating-actions">
        <button class="btn-premium btn-primary" onclick="window.scrollTo({top:0, behavior:'smooth'})">
            ↑ Top
        </button>
    </div>

    <!-- Navbar JS -->
    <script>
        // Username from localStorage
        const userNameNav = document.getElementById('userNameNav');
        if (userNameNav) {
            const name = localStorage.getItem('userName') || 'User';
            userNameNav.textContent = name;
        }

        // Logout
        window.logout = function () {
            if (confirm('Logout?')) {
                localStorage.clear();
                window.location.href = 'login.html';
            }
        };
    </script>

    <!-- Page specific scripts -->
    <script src="js/goal.js"></script>

</body>

</html>
